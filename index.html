<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minecraft – Volume Gamma · MuMaFi</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;600;800&family=JetBrains+Mono:wght@400;500&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-deep:#04060b;
    --bg-panel:#0b111d;
    --bg-panel-2:#101a2c;
    --line:#1c2a40;
    --cube:#4d9eff;
    --cube-dim:#1e3a5f;
    --cube-glow:rgba(77,158,255,.35);
    --foam:#e9f1ff;
    --muted:#6d7e9c;
    --muted-2:#425169;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:
      radial-gradient(ellipse 900px 500px at 50% -10%, rgba(77,158,255,.10), transparent 60%),
      var(--bg-deep);
    color:var(--foam);
    font-family:'Inter',sans-serif;
    min-height:100vh;
    padding-bottom:110px;
  }
  ::selection{background:var(--cube-dim);color:var(--foam);}

  .hero{
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:56px 24px 40px;
    text-align:center;
  }
  .cover-wrap{
    width:200px;height:200px;
    margin-bottom:28px;
    position:relative;
    border-radius:16px;
    overflow:visible;
  }
  .cover-glow-bg{
    position:absolute; inset:-40px;
    background:radial-gradient(circle, var(--cube-glow), transparent 65%);
    filter:blur(6px);
    opacity:.5;
    transition:opacity .6s ease;
    z-index:0;
  }
  body.playing .cover-glow-bg{opacity:1;}
  .cover-img{
    position:relative;
    z-index:1;
    width:100%;height:100%;
    object-fit:cover;
    border-radius:16px;
    display:block;
    box-shadow:0 10px 40px rgba(0,0,0,.55), 0 0 0 1px rgba(77,158,255,.25);
    transition:transform .6s ease, box-shadow .6s ease;
  }
  body.playing .cover-img{
    transform:scale(1.03);
    box-shadow:0 10px 50px rgba(0,0,0,.6), 0 0 40px var(--cube-glow);
  }

  .album-title{
    font-family:'Unbounded',sans-serif;
    font-weight:800;
    font-size:clamp(24px,4vw,34px);
    letter-spacing:-.01em;
    margin:0 0 6px;
  }
  .album-meta{
    color:var(--muted);
    font-family:'JetBrains Mono',monospace;
    font-size:13px;
    letter-spacing:.02em;
  }
  .album-meta span{color:var(--cube);}

  .tracklist{
    max-width:640px;
    margin:32px auto 0;
    padding:0 20px;
  }
  .tracklist-head{
    display:flex;
    justify-content:space-between;
    align-items:baseline;
    padding:0 8px 14px;
    border-bottom:1px solid var(--line);
    margin-bottom:6px;
  }
  .tracklist-head h2{
    font-family:'Unbounded',sans-serif;
    font-weight:600;
    font-size:15px;
    margin:0;
    letter-spacing:.02em;
  }
  .tracklist-head .count{
    font-family:'JetBrains Mono',monospace;
    font-size:12px;
    color:var(--muted-2);
  }

  .track{
    display:flex;
    align-items:center;
    gap:16px;
    padding:12px 8px;
    border-radius:10px;
    cursor:pointer;
    position:relative;
    transition:background .15s ease;
  }
  .track:hover{background:var(--bg-panel);}
  .track.active{background:var(--bg-panel-2);}

  .track-num{
    font-family:'JetBrains Mono',monospace;
    font-size:13px;
    color:var(--muted-2);
    width:22px;
    text-align:right;
    flex-shrink:0;
  }
  .track.active .track-num{color:var(--cube);}

  .track-icon{
    width:22px;height:22px;
    flex-shrink:0;
    display:flex;align-items:center;justify-content:center;
    color:var(--cube);
    opacity:0;
    transition:opacity .15s ease;
  }
  .track.active .track-icon{opacity:1;}
  .track-icon svg{width:14px;height:14px;}

  .track-info{flex:1;min-width:0;}
  .track-title{
    font-size:15px;
    font-weight:500;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }
  .track.active .track-title{color:var(--cube);}
  .track-artist{
    font-size:12px;
    color:var(--muted);
    margin-top:2px;
  }

  .track-progress{
    height:2px;
    background:var(--line);
    border-radius:2px;
    margin-top:6px;
    overflow:hidden;
  }
  .track-progress-fill{
    height:100%;
    width:0%;
    background:var(--cube);
  }

  .track-dur{
    font-family:'JetBrains Mono',monospace;
    font-size:12px;
    color:var(--muted-2);
    flex-shrink:0;
  }
  .track.active .track-dur{color:var(--cube);}

  .player-bar{
    position:fixed;
    bottom:0;left:0;right:0;
    background:rgba(11,17,29,.92);
    backdrop-filter:blur(14px);
    border-top:1px solid var(--line);
    padding:10px 20px 14px;
  }
  .player-inner{
    max-width:640px;
    margin:0 auto;
  }
  .player-top{
    display:flex;
    align-items:center;
    gap:14px;
  }
  .player-thumb{
    width:42px;height:42px;
    border-radius:8px;
    background:var(--bg-panel-2);
    border:1px solid var(--line);
    flex-shrink:0;
    overflow:hidden;
    position:relative;
  }
  .player-thumb img{width:100%;height:100%;object-fit:cover;display:block;}
  .player-meta{flex:1;min-width:0;}
  .player-title{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .player-artist{font-size:12px;color:var(--muted);}

  .controls{display:flex;align-items:center;gap:14px;flex-shrink:0;}
  .btn{
    background:none;border:none;color:var(--foam);
    cursor:pointer;padding:6px;display:flex;align-items:center;justify-content:center;
    opacity:.85; transition:opacity .15s, transform .1s;
  }
  .btn:hover{opacity:1;}
  .btn:active{transform:scale(.92);}
  .btn svg{width:18px;height:18px;}
  .btn.play{
    background:var(--cube);color:#04060b;
    width:36px;height:36px;border-radius:50%;
    opacity:1;
  }
  .btn.play svg{width:16px;height:16px;}

  .seek-row{
    display:flex;align-items:center;gap:10px;
    margin-top:10px;
  }
  .time{
    font-family:'JetBrains Mono',monospace;
    font-size:11px;color:var(--muted-2);
    width:36px; flex-shrink:0;
  }
  .time.right{text-align:right;}
  input[type=range]{
    -webkit-appearance:none;appearance:none;
    flex:1;height:3px;border-radius:3px;
    background:var(--line);
    outline:none;
  }
  input[type=range]::-webkit-slider-thumb{
    -webkit-appearance:none;appearance:none;
    width:11px;height:11px;border-radius:50%;
    background:var(--cube);cursor:pointer;
    box-shadow:0 0 6px var(--cube-glow);
  }
  input[type=range]::-moz-range-thumb{
    width:11px;height:11px;border-radius:50%;
    background:var(--cube);border:none;cursor:pointer;
  }

  @media (prefers-reduced-motion: reduce){
    .eq span{animation:none;}
  }

  footer{
    text-align:center;
    color:var(--muted-2);
    font-family:'JetBrains Mono',monospace;
    font-size:11px;
    padding:32px 20px 0;
  }
</style>
</head>
<body>

  <div class="hero">
    <div class="cover-wrap">
      <div class="cover-glow-bg"></div>
      <img class="cover-img" src="cover.png" alt="Minecraft – Volume Gamma Cover">
    </div>
    <h1 class="album-title">Minecraft – Volume Gamma</h1>
    <div class="album-meta">Fan-Compilation von <span>MuMaFi</span> · 14 Songs · 44:30 · 2018</div>
  </div>

  <div class="tracklist">
    <div class="tracklist-head">
      <h2>Songs</h2>
      <span class="count" id="track-count">14 Tracks</span>
    </div>
    <div id="track-list"></div>
  </div>

  <footer>Fan-Compilation von MuMaFi · Original-Tracks von C418</footer>

  <div class="player-bar">
    <div class="player-inner">
      <div class="player-top">
        <div class="player-thumb">
          <img id="player-cover" src="cover.png" alt="">
        </div>
        <div class="player-meta">
          <div class="player-title" id="now-title">Ember March</div>
          <div class="player-artist" id="now-artist">C418</div>
        </div>
        <div class="controls">
          <button class="btn" id="prev-btn" aria-label="Vorheriger Titel">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
          </button>
          <button class="btn play" id="play-btn" aria-label="Abspielen">
            <svg id="play-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
          </button>
          <button class="btn" id="next-btn" aria-label="Nächster Titel">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M16 6h2v12h-2zM6 6l8.5 6L6 18z"/></svg>
          </button>
        </div>
      </div>
      <div class="seek-row">
        <span class="time" id="time-current">0:00</span>
        <input type="range" id="seek" min="0" max="100" value="0" step="0.1">
        <span class="time right" id="time-total">0:00</span>
      </div>
    </div>
  </div>

  <audio id="audio" preload="metadata"></audio>

<script>
// Playlist in tag-order (TAG:track). Real artist per track based on filename/metadata attribution.
const tracks = [
  { n:1,  title:"Ember March",     artist:"C418",   file:"01_-_C418_-_Battlemode_1.mp3",                                                     dur:490.15 },
  { n:2,  title:"Glitch Signal",   artist:"MuMaFi", file:"02_-_mc_type_shi.mp3",                                                             dur:95.16 },
  { n:3,  title:"Voxel Frequency", artist:"C418",   file:"04_-_Minecraft_Music_-_Possible_new_track__C418_x_Deadmau5_.mp3",                  dur:172.10 },
  { n:4,  title:"Moog City 3",     artist:"C418",   file:"Minecraft__-_Moog_City_3__Excerpt_from_Alpha___C418_Official___-icuZv3Iupk_.mp3",  dur:124.08 },
  { n:5,  title:"Dragon Fish",     artist:"C418",   file:"Dragon_Fish__RxHgq2w-RsY_.mp3",                                                    dur:372.29 },
  { n:6,  title:"Turtle Cove",     artist:"MuMaFi", file:"16_-_Vol_Gamma_-_Turtle_Cove.mp3",                                                 dur:110.29 },
  { n:7,  title:"Pufferfish Funk", artist:"MuMaFi", file:"18_-_Vol_Gamma_-_Pufferfish_Funk.mp3",                                             dur:142.76 },
  { n:8,  title:"Shipwreck Tales", artist:"MuMaFi", file:"15_-_Vol_Gamma_-_Shipwreck_Tales.mp3",                                             dur:95.06 },
  { n:9,  title:"Drowned",         artist:"MuMaFi", file:"My_Song_219__online-audio-converter_com_.mp3",                                     dur:108.54 },
  { n:10, title:"Coral Current",   artist:"MuMaFi", file:"12_-_Vol_Gamma_-_Coral_Current.mp3",                                              dur:173.77 },
  { n:11, title:"Drowned Depths",  artist:"MuMaFi", file:"13_-_Vol_Gamma_-_Drowned_Depths.mp3",                                             dur:148.09 },
  { n:12, title:"Axolotl",         artist:"C418",   file:"20_-_Axolotl.mp3",                                                                dur:303.17 },
  { n:13, title:"Shuniji",         artist:"C418",   file:"19_-_Shuniji.mp3",                                                                dur:244.22 },
  { n:14, title:"Kelp Forest",     artist:"MuMaFi", file:"14_-_Vol_Gamma_-_Kelp_Forest.mp3",                                                dur:91.06 },
];

const listEl = document.getElementById('track-list');
const audio = document.getElementById('audio');
const playBtn = document.getElementById('play-btn');
const playIcon = document.getElementById('play-icon');
const prevBtn = document.getElementById('prev-btn');
const nextBtn = document.getElementById('next-btn');
const seek = document.getElementById('seek');
const timeCurrent = document.getElementById('time-current');
const timeTotal = document.getElementById('time-total');
const nowTitle = document.getElementById('now-title');
const nowArtist = document.getElementById('now-artist');

let currentIndex = 0;
let isSeeking = false;

function fmt(s){
  if(!isFinite(s) || s<0) s=0;
  const m = Math.floor(s/60);
  const sec = Math.floor(s%60).toString().padStart(2,'0');
  return `${m}:${sec}`;
}

function renderList(){
  listEl.innerHTML = tracks.map((t,i)=>`
    <div class="track" data-index="${i}">
      <div class="track-num">${t.n}</div>
      <div class="track-icon">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
      </div>
      <div class="track-info">
        <div class="track-title">${t.title}</div>
        <div class="track-artist">${t.artist}</div>
        <div class="track-progress"><div class="track-progress-fill"></div></div>
      </div>
      <div class="track-dur">${fmt(t.dur)}</div>
    </div>
  `).join('');

  listEl.querySelectorAll('.track').forEach(el=>{
    el.addEventListener('click', ()=>{
      const idx = parseInt(el.dataset.index);
      loadTrack(idx, true);
    });
  });
}

function updateActiveUI(){
  listEl.querySelectorAll('.track').forEach((el,i)=>{
    el.classList.toggle('active', i===currentIndex);
    const fill = el.querySelector('.track-progress-fill');
    if(i!==currentIndex) fill.style.width='0%';
  });
}

function loadTrack(idx, autoplay){
  currentIndex = ((idx % tracks.length) + tracks.length) % tracks.length;
  const t = tracks[currentIndex];
  audio.src = t.file;
  nowTitle.textContent = t.title;
  nowArtist.textContent = t.artist;
  timeTotal.textContent = fmt(t.dur);
  updateActiveUI();
  if(autoplay){
    audio.play();
  }
}

function setPlayingUI(playing){
  document.body.classList.toggle('playing', playing);
  playIcon.innerHTML = playing
    ? '<path d="M6 5h4v14H6zm8 0h4v14h-4z"/>'
    : '<path d="M8 5v14l11-7z"/>';
  playBtn.setAttribute('aria-label', playing ? 'Pausieren' : 'Abspielen');
}

playBtn.addEventListener('click', ()=>{
  if(audio.paused){ audio.play(); } else { audio.pause(); }
});
prevBtn.addEventListener('click', ()=> loadTrack(currentIndex-1, true));
nextBtn.addEventListener('click', ()=> loadTrack(currentIndex+1, true));

audio.addEventListener('play', ()=> setPlayingUI(true));
audio.addEventListener('pause', ()=> setPlayingUI(false));

audio.addEventListener('timeupdate', ()=>{
  if(isSeeking) return;
  const d = audio.duration || tracks[currentIndex].dur;
  const pct = d ? (audio.currentTime/d*100) : 0;
  seek.value = pct;
  timeCurrent.textContent = fmt(audio.currentTime);
  const activeFill = listEl.querySelectorAll('.track')[currentIndex]?.querySelector('.track-progress-fill');
  if(activeFill) activeFill.style.width = pct+'%';
});

audio.addEventListener('loadedmetadata', ()=>{
  timeTotal.textContent = fmt(audio.duration);
});

// Sequential playback: advance to next track in tag order when one ends.
audio.addEventListener('ended', ()=>{
  if(currentIndex < tracks.length - 1){
    loadTrack(currentIndex+1, true);
  } else {
    setPlayingUI(false);
  }
});

seek.addEventListener('input', ()=>{ isSeeking = true; });
seek.addEventListener('change', ()=>{
  const d = audio.duration || tracks[currentIndex].dur;
  audio.currentTime = (seek.value/100)*d;
  isSeeking = false;
});

renderList();
loadTrack(0, false);
</script>
</body>
</html>
